My flagship project, Tasuke'26, is a 9-container Docker microservices SaaS platform with modules spanning AI surveillance (SafeSight using YOLOv8), hospital management (MedFlow 2 with real-time biometric waveforms), waste logistics, and retail analytics \u{2014} all connected via a Nexus landing page with an Anthropic-powered AI chatbot.

More recently, I built Print Sentinel \u{2014} a full-stack AI 3D print failure detection system using YOLOv8, the Anthropic Claude API with an 8-turn agentic loop, ChromaDB RAG across three collections, Socket.IO for real-time streaming, and a React 18 frontend \u{2014} deployed across Vercel, Render, MongoDB Atlas, and Redis Cloud.

I've also mentored junior developers, captained my university cricket team, and won three consecutive university badminton championships. I'm now actively seeking a fresher/junior developer role at an MNC or remote-first startup where I can push the boundaries of AI-driven full-stack engineering.`,tags:["intro","fresher","hr"]},{id:"hr-2",category:"intro",question:"Why should we hire you over other freshers?",answer:`Most freshers bring coursework and toy projects. I bring production-architecture thinking:

1. **System Scale** \u{2014} Tasuke'26 is a 9-container microservices platform, not a CRUD app. I've designed inter-service communication, container orchestration, and multi-module coordination.

2. **AI Integration Depth** \u{2014} Print Sentinel uses an 8-turn agentic loop with the Claude API \u{2014} tool-use, function calling, ChromaDB RAG, real-time Socket.IO streaming. That's not a tutorial; that's engineering.

3. **Delivery Mindset** \u{2014} Both flagship projects are deployed and live, not just local demos. I've solved real deployment challenges: CORS, Docker networking, environment parity, cold-start latency on free tiers.

4. **Communication** \u{2014} I've mentored junior developers and coordinated tech fests, so I can collaborate, document, and onboard \u{2014} not just code in isolation.

I'm not just promising potential \u{2014} I'm showing you what I can deliver on day one.`,tags:["hr","competitive","differentiator"]},{id:"hr-3",category:"intro",question:"Where do you see yourself in 3–5 years?",answer:`In 3 years: I want to be a strong mid-level Full Stack or AI Engineer who has shipped meaningful features in production, ideally at a company working at the intersection of AI and real-world systems \u{2014} healthcare AI, developer tooling, or infrastructure.

In 5 years: I aim to be technically deep enough to lead small engineering squads and architect systems end-to-end, while still staying hands-on with code. I want to have contributed to open-source AI tooling and potentially published something in the applied ML space.

What I'm optimizing for isn't title \u{2014} it's depth of craft and real-world impact.`,tags:["career","goals","hr"]},{id:"hr-4",category:"intro",question:"What are your biggest strengths and weaknesses?",answer:`**Strengths:**
- **Systems thinking** \u{2014} I naturally decompose large problems into components and think about interfaces before implementation.
- **Persistence under ambiguity** \u{2014} Print Sentinel had no reference implementation for combining YOLOv8 + Claude tool-use + ChromaDB RAG. I figured it out iteratively.
- **Cross-domain execution** \u{2014} I can move between frontend polish (GSAP, R3F) and backend architecture (Docker, Redis, MongoDB) in the same sprint.

**Weakness (honest):**
I tend to over-engineer initial designs \u{2014} I'll reach for microservices when a monolith would ship faster. I've been actively correcting this by asking "what's the simplest thing that works?" before picking a stack. I still catch myself doing it, but I've gotten faster at course-correcting.`,tags:["hr","strengths","weaknesses"]},{id:"hr-5",category:"intro",question:"Tell me about a time you failed and what you learned.",answer:`During the early phase of Tasuke'26, I planned to wire all 9 containers with a single shared database. The first integration test brought everything down \u{2014} one slow query cascaded into service-wide timeouts.

I had to stop, re-read microservices architecture patterns, and spend two days re-designing the data layer with per-service databases and async event communication. It pushed the timeline by nearly a week.

**What I learned:** Architectural decisions made in the first hour cost the most time later. Now, I diagram data ownership and service boundaries before writing a single line of code. It's not just a best practice \u{2014} it's self-protection.`,tags:["behavioral","failure","STAR"]},{id:"hr-6",category:"intro",question:"Are you comfortable working in a team or do you prefer solo work?",answer:`Both, depending on what the work demands.

I do my sharpest individual work in focused deep-work sessions \u{2014} that's when I designed the RAG pipeline for Print Sentinel and wrote the YOLOv8 inference integration. But I've also mentored junior developers and coordinated cross-functional activities during tech fests, which requires listening, explaining, and adjusting to other people's speed.

What I've learned is: architecture and critical decisions need focused thinking (often solo), while implementation and review benefit enormously from collaboration. I'm comfortable in either mode and I can switch deliberately.`,tags:["teamwork","collaboration","behavioral"]},{id:"hr-7",category:"intro",question:"Why do you want to join our company specifically?",answer:`[Customize this answer before the interview with specific reasons relevant to the company.]

General framework I use:
1. **Product/Mission resonance** \u{2014} I look for companies building systems that make real processes smarter, not just wrapping existing tools with a UI.
2. **Engineering culture** \u{2014} I want to work somewhere that ships production code, not just PoCs \u{2014} where engineering decisions are explained and debated, not handed down.
3. **Growth gradient** \u{2014} I'm early in my career, so I want to work with engineers who'll hold my code to a high standard and push me.

[Add: specific product, a recent engineering blog post, a problem domain, or something about the team you genuinely find compelling.]`,tags:["hr","motivation","company"]},{id:"hr-8",category:"intro",question:"How do you handle pressure and tight deadlines?",answer:`I compartmentalize and prioritize ruthlessly.

During the Print Sentinel build, I had an academic submission deadline overlapping with the final integration sprint. My approach:
1. I listed everything that needed to be done and cut any feature that wasn't core to the demo.
2. I worked in time-boxed blocks \u{2014} 2-hour deep-work sessions with hard stops to avoid rabbit holes.
3. I tested incrementally so I wasn't doing a massive debugging session at 2am before the deadline.

I also learned from athletics \u{2014} as cricket team captain, pressure situations are normal. You focus on the controllable: your own execution, not the outcome.`,tags:["pressure","deadline","behavioral"]},{id:"t26-1",category:"tasuke26",question:"Walk me through Tasuke'26 at a high level. What is it and why did you build it?",answer:`Tasuke'26 (also called Nexus) is a 9-container Docker microservices SaaS platform that simulates a multi-tenant enterprise product with four distinct real-world modules.

**The four modules:**
- **SafeSight** \u{2014} AI surveillance with YOLOv8 object/intrusion detection
- **MedFlow 2** \u{2014} Hospital management with live biometric waveforms via Socket.IO and Three.js (React Three Fiber)
- **EcoTrack** \u{2014} Waste logistics with GPS fleet tracking
- **SmartRetail** \u{2014} Retail analytics with footfall AI

A **Nexus landing page** ties them together, and an Anthropic-powered AI chatbot with SSE streaming sits across the platform.

**Why I built it:** I wanted to move beyond CRUD tutorials and understand how production-grade systems are actually architected \u{2014} service isolation, inter-container communication, shared infrastructure (Redis, MongoDB), real-time data pipelines, and how you design for multi-module complexity without a monolith.

It's also my MCA thesis project, which I wrote and submitted as a full academic paper.`,tags:["tasuke26","overview","architecture"]},{id:"t26-2",category:"tasuke26",question:"Why 9 containers specifically? Explain your Docker architecture.",answer:`Each container maps to a bounded service with a single responsibility:

1. **Nexus Frontend** \u{2014} React app serving the landing/portal
2. **SafeSight Service** \u{2014} Python FastAPI for YOLOv8 inference
3. **MedFlow Backend** \u{2014} Node.js with Socket.IO for real-time biometric streaming
4. **EcoTrack Service** \u{2014} Fleet tracking and GPS logic
5. **SmartRetail Service** \u{2014} Footfall AI and analytics
6. **AI Chatbot Service** \u{2014} Anthropic API + SSE streaming
7. **MongoDB** \u{2014} Shared document store (each service uses its own DB/collection)
8. **Redis** \u{2014} Caching layer shared across services
9. **Nginx** \u{2014} Reverse proxy handling routing and SSL termination

**Docker Compose** orchestrates all containers. Each service communicates via Docker's internal network using service names as hostnames \u{2014} no hardcoded IPs.

The Nginx container is the single entry point \u{2014} all external traffic routes through it, which simplifies CORS, SSL, and load balancing.`,tags:["docker","architecture","containers"]},{id:"t26-3",category:"tasuke26",question:"How does SafeSight work? Explain the YOLOv8 integration.",answer:`SafeSight is a real-time AI surveillance module built on YOLOv8 (You Only Look Once v8) from Ultralytics.

**Flow:**
1. Video feed (simulated or live) is sent as frames to the Python FastAPI service.
2. YOLOv8 runs inference on each frame \u{2014} detecting objects (person, vehicle, etc.) and their bounding boxes with confidence scores.
3. A custom rule engine evaluates detections against zone boundaries (intrusion logic).
4. Alerts are pushed to the frontend via WebSocket in real time.

**Technical choices:**
- I chose YOLOv8 over YOLO v5 for its better small-object detection and native Python API.
- Used ||ultralytics|| Python package \u{2014} no custom training, the pretrained COCO weights were sufficient for demo surveillance scenarios.
- FastAPI because Python async + background tasks are a clean fit for per-frame inference without blocking the main thread.

**Limitation acknowledged:** A production system would need a GPU endpoint and frame batching. My demo runs on CPU inference with downsampled frames to keep latency acceptable.`,tags:["yolo","ai","safesight","computer-vision"]},{id:"t26-4",category:"tasuke26",question:"MedFlow 2 uses real-time biometric waveforms. How did you implement that?",answer:`MedFlow 2 needed live ECG-style waveform visualizations that update continuously \u{2014} think hospital monitor aesthetics.

**Architecture:**
- **Backend:** Node.js service with Socket.IO. It generates synthetic biometric data (heart rate, SpO2, blood pressure waveform points) on a timer \u{2014} mimicking real sensor data.
- **Frontend:** React Three Fiber (Three.js in React) for the 3D waveform renderer. Each data point updates the geometry in real time.
- **Socket.IO** maintains a persistent connection \u{2014} data is pushed from server to client every 100ms.

**Why Three.js for a waveform?**
A canvas 2D solution would work, but I wanted the visual polish of a 3D-rendered waveform with glow effects and depth \u{2014} consistent with the dark-themed, premium UI aesthetic across all my projects.

**Challenge:** Preventing memory leaks when the component unmounts. I added cleanup for the Socket.IO listener and Three.js geometry disposal in the useEffect return function.`,tags:["socket.io","three.js","r3f","real-time","medflow"]},{id:"t26-5",category:"tasuke26",question:"How is the Anthropic chatbot integrated into Nexus?",answer:`The Nexus AI chatbot uses the Anthropic Messages API with SSE (Server-Sent Events) streaming \u{2014} so responses appear token by token, like ChatGPT.

**Flow:**
1. User types a message in the frontend chat widget.
2. The React frontend sends a POST request to my Node.js chatbot service.
3. The service calls Anthropic's API with ||stream: true||.
4. The Anthropic response streams back as SSE events.
5. My service pipes those events directly to the frontend using ||res.write()||.
6. The frontend reads the SSE stream using the ||EventSource|| API and appends tokens as they arrive.

**System prompt:** The chatbot is context-aware of the Nexus platform \u{2014} it knows about SafeSight, MedFlow, EcoTrack, SmartRetail \u{2014} so it can answer platform-specific queries.

**Why SSE over WebSocket?** SSE is simpler for unidirectional streaming (server \u{2192} client). The chatbot doesn't need bidirectional communication after the message is sent.`,tags:["anthropic","sse","streaming","chatbot"]},{id:"t26-6",category:"tasuke26",question:"What were the hardest technical challenges in Tasuke'26?",answer:`Three stand out:

**1. Cross-container networking on Docker Compose**
Early on, services were hardcoding ||localhost|| \u{2014} which doesn't work in a Docker network where each service is its own container. I had to rebuild the networking model using Docker service names as hostnames and configure the shared internal network correctly.

**2. Socket.IO CORS across Nginx**
Socket.IO upgrade requests (WebSocket handshake) were being blocked by Nginx because the proxy wasn't passing the ||Upgrade|| and ||Connection|| headers. I had to study Nginx proxy_pass configuration specifically for WebSocket support.

**3. Environment variable management across 9 services**
Each service needs its own env vars (DB URIs, API keys, ports), but some are shared. Managing ||.env|| files per service without leaking secrets into the repo or duplicating config was a real discipline challenge. I landed on a root-level ||.env|| with per-service prefixes parsed in ||docker-compose.yml||.`,tags:["challenges","docker","networking","cors"]},{id:"ps-1",category:"printsentinel",question:"Explain Print Sentinel from scratch — what does it do and how?",answer:`Print Sentinel is a real-time AI system that monitors 3D prints and autonomously detects failure conditions \u{2014} then acts on them.

**Problem:** 3D printing fails silently \u{2014} spaghetti, layer shifts, bed adhesion failures can ruin a 12-hour print. You only discover the failure when you check physically.

**Solution:** A camera feed runs through a YOLOv8 model trained to detect four failure types. An AI agent (Claude API) then decides what action to take \u{2014} pause print, alert user, or continue monitoring.

**Tech Stack:**
- **YOLOv8** \u{2014} failure detection on video frames
- **Anthropic Claude API** \u{2014} 8-turn agentic loop with tool-use
- **ChromaDB** \u{2014} RAG across three collections (failure patterns, repair history, material knowledge)
- **Socket.IO** \u{2014} real-time streaming of detections to frontend
- **React 18** \u{2014} dashboard styled after a healthcare SaaS reference
- **6 Docker containers** \u{2014} decomposed into: inference service, agent service, RAG service, Socket.IO gateway, frontend, MongoDB

**Agentic loop:** The Claude agent receives detection data, queries the RAG system via tool calls, reasons over the context, and produces a structured action recommendation \u{2014} all within an 8-turn conversation loop.`,tags:["printsentinel","overview","yolo","claude","rag"]},{id:"ps-2",category:"printsentinel",question:"What is an agentic loop? Explain your 8-turn loop in Print Sentinel.",answer:`An agentic loop is a pattern where an LLM iteratively calls tools, receives results, reasons over them, and decides whether to act or call more tools \u{2014} until it reaches a final answer.

**My 8-turn loop in Print Sentinel:**

Turn 1: Claude receives detection data (failure type, confidence score, frame metadata).
Turn 2: Claude calls ||query_failure_patterns|| tool \u{2192} ChromaDB returns similar past failures.
Turn 3: Claude reasons over the patterns and calls ||query_repair_history|| \u{2192} gets recommended interventions.
Turn 4: Claude calls ||check_material_context|| \u{2192} gets material-specific failure thresholds.
Turn 5\u{2013}7: Claude synthesizes information, may call ||calculate_severity_score|| tool.
Turn 8: Claude returns a structured JSON response \u{2014} action type, confidence, human-readable explanation.

**Why limit to 8 turns?**
Infinite loops are an agentic anti-pattern. If the agent can't reach a confident decision in 8 turns, I return a "escalate to human" action with the partial reasoning \u{2014} better than an infinite loop with no resolution.

**Implementation:** Each turn appends to a ||messages|| array passed to the Anthropic API. Tool results are injected as ||tool_result|| content blocks per the Claude tool-use spec.`,tags:["agentic","claude","tool-use","rag"]},{id:"ps-3",category:"printsentinel",question:"What is RAG and how did you implement it with ChromaDB?",answer:`**RAG = Retrieval-Augmented Generation.** Instead of relying solely on the LLM's training data, you retrieve relevant context from a vector database at query time and inject it into the prompt.

**Why RAG for Print Sentinel?**
The Claude model doesn't know my specific failure patterns, material profiles, or repair history. RAG lets me inject that domain knowledge dynamically.

**Three ChromaDB collections:**
1. ||failure_patterns|| \u{2014} embeddings of documented 3D print failure signatures
2. ||repair_history|| \u{2014} past interventions and their outcomes
3. ||material_knowledge|| \u{2014} material-specific thresholds (PLA vs ABS vs PETG)

**Implementation flow:**
1. On startup, I embed documents into ChromaDB using ||sentence-transformers|| (all-MiniLM-L6-v2 model).
2. At query time, the query text is embedded with the same model.
3. ChromaDB returns the top-k most similar documents via cosine similarity.
4. Those documents are injected as context into the Claude prompt via tool results.

**Key design choice:** I kept the three collections separate rather than one unified collection \u{2014} this lets me query each domain independently and control result diversity per tool call.`,tags:["rag","chromadb","embeddings","vector-db"]},{id:"ps-4",category:"printsentinel",question:"How did you handle real-time streaming in Print Sentinel?",answer:`Real-time streaming has two parts in Print Sentinel:

**1. Detection streaming (YOLOv8 \u{2192} Frontend):**
- YOLOv8 runs inference per frame in the Python FastAPI service.
- Each detection event is emitted via Socket.IO to the gateway service.
- The React frontend subscribes to the ||detection|| event and updates the dashboard in real time \u{2014} bounding box overlays, confidence scores, failure type label.

**2. Agent reasoning streaming (Claude \u{2192} Frontend):**
- The agentic loop runs on the backend \u{2014} each tool call, tool result, and Claude response is captured.
- I emit intermediate "thinking steps" via Socket.IO as the agent works through its 8 turns.
- The frontend shows a live "Agent Thinking..." panel where the reasoning unfolds step by step.

**Why Socket.IO over SSE here?**
Print Sentinel needs bidirectional communication \u{2014} the frontend can send "pause print" commands back to the agent. Socket.IO handles both directions naturally. In Nexus, the chatbot only needed one direction, so SSE was simpler there.`,tags:["socket.io","streaming","real-time","frontend"]},{id:"ps-5",category:"printsentinel",question:"What are the four failure types Print Sentinel detects?",answer:`The YOLOv8 model is configured to detect these four classes:

1. **Spaghetti** \u{2014} Filament printing in mid-air, typically caused by first layer not adhering to the bed. Looks like tangled strings of plastic around the print.

2. **Layer Shift** \u{2014} The print head loses position (usually a mechanical slip), causing layers to be offset horizontally. The print looks "stepped" to the side.

3. **Bed Adhesion Failure** \u{2014} The first layer or base lifts off the build plate, causing warping or detachment. The print is no longer anchored.

4. **Under-extrusion** \u{2014} Not enough filament is being pushed through the nozzle, resulting in gaps, weak walls, or missing layers in the print.

**Training note:** I used a pre-existing dataset of labeled 3D print failure frames (publicly available from research on 3D printing monitoring). The model was fine-tuned for these four classes specifically, not the full COCO set.`,tags:["yolo","detection","classes","3d-printing"]},{id:"ps-6",category:"printsentinel",question:"How is Print Sentinel deployed?",answer:`Print Sentinel uses a split-deployment strategy across free-tier cloud services:

- **Frontend (React 18)** \u{2192} Vercel \u{2014} instant deploys from GitHub, excellent DX, CDN-backed.
- **Python AI Services (FastAPI + YOLOv8 + ChromaDB)** \u{2192} Render \u{2014} supports Python runtimes, persistent disks for ChromaDB.
- **Node.js Gateway + Agent Service** \u{2192} Render \u{2014} separate web services on Render.
- **MongoDB** \u{2192} MongoDB Atlas (free M0 cluster) \u{2014} managed, reliable.
- **Redis** \u{2192} Redis Cloud (free tier) \u{2014} session caching and pub/sub between services.

**Challenges on free tiers:**
- Render free instances spin down after inactivity (cold start ~30\u{2013}50s). I added a heartbeat ping from the frontend to keep the service warm during demos.
- ChromaDB persistence on Render requires configuring a persistent disk \u{2014} ephemeral file systems lose data on redeploy.
- CORS across multiple origins (Vercel frontend + Render backends) required explicit ||origins|| configuration in both FastAPI and the Socket.IO server.`,tags:["deployment","vercel","render","mongodb","redis"]},{id:"cs-1",category:"codesense",question:"What is CodeSense AI and why did you build it?",answer:`CodeSense AI is a GitHub-integrated AI code review agent that gives developers intelligent, actionable feedback on their code \u{2014} beyond what linters catch.

**Why:** Standard code review is slow (waiting for a human reviewer) and surface-level (style, obvious bugs). I wanted an agent that could reason about code architecture, potential edge cases, security concerns, and explain the "why" behind feedback \u{2014} not just flag lines.

**Key features:**
- GitHub integration \u{2014} point it at a repo or PR and it fetches the code directly.
- SSE streaming \u{2014} reviews stream back token by token, so you're reading feedback as it's generated.
- Redis caching \u{2014} repeated reviews of the same file/commit hash return instantly from cache.
- ChromaDB RAG \u{2014} a knowledge base of code review patterns, best practices, and anti-patterns informs the agent's feedback.
- Monaco Editor \u{2014} the frontend uses the VS Code editor component with line decorations (highlights the specific lines the agent is commenting on) and a DiffViewer.
- React Three Fiber / GSAP \u{2014} a topographic Perlin noise background adds visual depth to the frontend without being distracting.

**Tech stack:** Anthropic API (Claude), Node.js backend, Redis, ChromaDB, React 18, Monaco Editor, GSAP, R3F.`,tags:["codesense","overview","github","code-review"]},{id:"cs-2",category:"codesense",question:"Explain your Monaco Editor integration with line decorations.",answer:`Monaco Editor is the open-source editor that powers VS Code \u{2014} it can be embedded in React via ||@monaco-editor/react||.

**What I implemented:**

1. **Basic integration:** The editor loads the code file fetched from GitHub. Syntax highlighting works out of the box for all major languages.

2. **Line decorations:** When the AI agent identifies a specific line (e.g., "Line 47: potential null pointer dereference"), I use Monaco's ||editor.deltaDecorations()|| API to add a colored gutter marker and inline highlight on that exact line \u{2014} same as VS Code's error/warning squiggles.

3. **Decoration types:**
   - \u{1F534} Red: Bug / error risk
   - \u{1F7E1} Yellow: Code smell / anti-pattern
   - \u{1F535} Blue: Suggestion / improvement
   - \u{1F7E2} Green: Good practice noted

4. **DiffViewer:** For PR reviews, I use a side-by-side diff view powered by Monaco's built-in ||createDiffEditor()|| \u{2014} showing old code left, new code right, with the AI's comments overlaid on the relevant hunks.

**Challenge:** Synchronizing the agent's line references (returned as JSON) with Monaco's decoration model required careful parsing and coordinate mapping.`,tags:["monaco","frontend","editor","decorations"]},{id:"cs-3",category:"codesense",question:"How does the Redis caching work in CodeSense AI?",answer:`The caching strategy is based on content hashing:

**Cache key:** ||SHA-256(file_path + commit_hash + review_type)||
This ensures the cache is invalidated when either the file content or the review type changes.

**Flow:**
1. User submits a file for review.
2. Backend computes the cache key.
3. Check Redis: ||GET cache_key||
4. If HIT \u{2192} return cached review immediately (no API call, no cost, instant response).
5. If MISS \u{2192} call Anthropic API, stream the response, and on completion: ||SET cache_key <review_result> EX 86400|| (24hr TTL).

**Why Redis over in-memory?**
- Redis survives server restarts (persistence configured).
- Shared across multiple instances if I horizontally scale the backend.
- Built-in TTL management.

**TTL strategy:** 24 hours for file reviews. For PR-based reviews (which are commit-specific), I use a longer 72-hour TTL since the same commit hash will never change.

This made repeated demo reviews essentially instant and reduced Anthropic API costs during development significantly.`,tags:["redis","caching","codesense","optimization"]},{id:"tech-1",category:"technical",question:"What is the time complexity of binary search and why?",answer:`Binary search runs in **O(log n)** time.

**Why:** Each comparison eliminates half the remaining search space. Starting with n elements:
- After 1 comparison: n/2 remain
- After 2 comparisons: n/4 remain
- After k comparisons: n/2^k remain

We stop when n/2^k = 1, i.e., k = log\u{2082}(n).

**Space complexity:** O(1) iteratively, O(log n) recursively due to the call stack.

**Prerequisite:** The array must be sorted. If it's not sorted, sorting costs O(n log n), so binary search only wins if you're doing multiple queries on the same data.

**Real-world use:** Binary search appears in: sorted array search, lower_bound/upper_bound in std::set, finding insert position, and I've used the pattern to optimize a "minimum threshold" problem where the search space was monotonic.`,tags:["dsa","binary-search","complexity"]},{id:"tech-2",category:"technical",question:"Explain the difference between a process and a thread.",answer:`**Process:** An independent execution unit with its own memory space (heap, stack, code, data). Processes are isolated \u{2014} one crashing doesn't affect others. Inter-process communication (IPC) requires explicit mechanisms: pipes, sockets, shared memory.

**Thread:** A lightweight execution unit *within* a process. Threads share the same memory space (heap, code) but have their own stack and registers. They can communicate directly via shared memory \u{2014} which is fast but requires synchronization.

**Key differences:**
| | Process | Thread |
|--|--|--|
| Memory | Isolated | Shared within process |
| Creation cost | Heavy (fork) | Lightweight |
| Communication | IPC (slow) | Shared memory (fast) |
| Crash isolation | Yes | No (one thread crashes the process) |
| Switching overhead | High (context switch) | Low |

**In my projects:** Node.js is single-threaded with an event loop \u{2014} it uses non-blocking I/O to handle concurrency without threads. Python's GIL limits true CPU parallelism with threads, which is why my FastAPI services use ||asyncio|| for concurrency and process-based workers (Uvicorn) for CPU-bound YOLOv8 inference.`,tags:["os","process","thread","concurrency"]},{id:"tech-3",category:"technical",question:"What is database indexing and when would you use it?",answer:`An index is a data structure (usually a B-tree or hash map) that allows the database to find rows matching a query condition without scanning every row.

**Without index:** Full table scan \u{2014} O(n) for every query.
**With index:** O(log n) for B-tree indexes on the indexed column.

**When to use:**
- Columns that appear frequently in WHERE clauses
- Columns used in JOIN conditions
- Columns with high cardinality (many distinct values)

**When NOT to use:**
- Columns that are frequently written (every write updates the index \u{2014} overhead)
- Small tables (full scan is fast enough)
- Low-cardinality columns (e.g., a boolean ||is_active|| \u{2014} an index here is rarely beneficial)

**In my projects:** In Print Sentinel's MongoDB, I added an index on ||{ detection_timestamp: -1, failure_type: 1 }|| (compound index) for the dashboard query that filters by failure type sorted by time. Without it, every dashboard load was a collection scan.

**MongoDB specifics:** MongoDB uses B-tree indexes by default. I also used a TTL index on detection logs to auto-expire old records after 30 days \u{2014} keeping the collection size bounded.`,tags:["database","indexing","mongodb","sql"]},{id:"tech-4",category:"technical",question:"Explain REST vs WebSocket vs SSE — when do you use each?",answer:`**REST (HTTP Request-Response):**
- Client sends a request, server responds, connection closes.
- Stateless, cacheable, simple.
- Use when: CRUD operations, data fetching, APIs where the client initiates all interactions.
- My use: GitHub code fetching in CodeSense AI, all standard API endpoints.

**WebSocket:**
- Persistent, full-duplex connection. Both sides can send messages at any time.
- Use when: you need real-time bidirectional communication \u{2014} chat, gaming, collaborative editing, control signals.
- My use: Socket.IO in Print Sentinel (detections from server + control commands from client) and MedFlow 2 biometric streaming.

**SSE (Server-Sent Events):**
- Persistent HTTP connection where only the server pushes data to the client.
- Simpler than WebSocket, auto-reconnects, works over HTTP/2.
- Use when: server needs to push a stream of data but client doesn't need to send messages mid-stream.
- My use: Anthropic API streaming in the Nexus chatbot and CodeSense AI reviews.

**Rule of thumb:** SSE > WebSocket for unidirectional streams (simpler). WebSocket > SSE when you need bidirectionality. REST for everything else.`,tags:["rest","websocket","sse","networking","protocols"]},{id:"tech-5",category:"technical",question:"What is Docker and why did you use it extensively?",answer:`Docker is a containerization platform that packages an application and all its dependencies into a portable, isolated unit called a container.

**Why containers over virtual machines:**
- Lightweight \u{2014} share the host OS kernel (no guest OS overhead).
- Fast \u{2014} containers start in seconds, VMs in minutes.
- Consistent \u{2014} "works on my machine" becomes "works everywhere Docker runs."

**Why I used Docker extensively:**
1. **Service isolation** \u{2014} Each service in Tasuke'26 and Print Sentinel runs in its own container with its own dependencies. A Python service can use Python 3.10, while a Node service uses Node 18 \u{2014} no conflicts.
2. **Environment parity** \u{2014} My local dev environment and the Render deployment are identical because both run the same Docker image.
3. **Networking** \u{2014} Docker Compose creates an internal network where services find each other by name (not IP address). No manual port mapping between services.
4. **Reproducibility** \u{2014} ||docker-compose up|| brings up all 9 services with one command.

**What I've learned the hard way:**
- Never put secrets in Dockerfiles (they end up in the image layers).
- Multi-stage builds matter for Python \u{2014} separate build stage from runtime to keep image sizes small.
- Always pin versions in base images \u{2014} ||python:3.10-slim|| not ||python:latest||.`,tags:["docker","containers","devops","deployment"]},{id:"tech-6",category:"technical",question:"Design a URL shortener system (simplified system design).",answer:`**Requirements:** Input: long URL. Output: short 6\u{2013}8 char code. Must redirect, handle ~100M URLs, read-heavy.

**Core components:**
1. **API Gateway** \u{2014} single entry point, rate limiting.
2. **Shortening Service** \u{2014} generates short codes.
3. **Redirect Service** \u{2014} looks up short code \u{2192} redirects to long URL.
4. **Database** \u{2014} stores mappings.
5. **Cache** \u{2014} Redis for hot URLs (popular short codes accessed repeatedly).

**Short code generation:**
- Take the URL's hash (MD5/SHA-256), take first 6 chars.
- Risk of collision \u{2192} check DB before saving, retry with different hash slice.
- Alternative: base62 encoding of an auto-incrementing ID (simpler, no collision).

**Database choice:**
- Use a key-value store like Redis or DynamoDB \u{2014} the access pattern is ||GET shortCode \u{2192} longURL||. No need for relational queries.
- For analytics (click counts, geo), a separate time-series store or Kafka \u{2192} analytics pipeline.

**Scaling:**
- Read-heavy \u{2192} Redis cache with high TTL for popular URLs (cache-aside pattern).
- Writes are rare \u{2192} single writer node is fine at moderate scale.
- If global: CDN for redirect responses with geographically close cache pops.

**My honest note:** I've implemented simplified versions of this pattern in my own projects \u{2014} the cache-aside strategy with Redis in CodeSense AI uses the same lookup pattern.`,tags:["system-design","url-shortener","distributed-systems"]},{id:"fs-1",category:"fullstack",question:"Explain the React component lifecycle and when you use useEffect.",answer:`**In class components:** lifecycle methods like ||componentDidMount||, ||componentDidUpdate||, ||componentWillUnmount|| handled side effects.

**In functional components (hooks era):** ||useEffect|| replaces all three.

**useEffect(fn, deps):**
- ||[]|| (empty): runs once after mount (like componentDidMount).
- ||[dep1, dep2]||: runs after mount AND whenever those deps change.
- No array: runs after every render (rarely what you want).

**Cleanup:** Return a function from useEffect to clean up \u{2014} event listeners, subscriptions, timers.

[CODEBLOCK]useEffect(() => {
  const socket = io(SERVER_URL);
  socket.on('detection', handleDetection);
  return () => socket.disconnect(); // cleanup on unmount
}, []);[/CODEBLOCK]

**In my projects:** I use this pattern in Print Sentinel to connect to Socket.IO on component mount and disconnect cleanly on unmount \u{2014} preventing memory leaks when the dashboard component is removed from the DOM.

**Common mistakes I've made and fixed:**
- Missing cleanup \u{2192} memory leaks with Socket.IO listeners accumulating.
- Stale closures \u{2192} the handler function capturing old state. Fixed with ||useCallback|| or adding state to deps.
- Forgetting deps \u{2192} infinite re-render loops when an object is in deps but recreated each render.`,tags:["react","hooks","useEffect","lifecycle"]},{id:"fs-2",category:"fullstack",question:"What is middleware in Express.js and how does it work?",answer:`Middleware in Express is a function that sits in the request-response pipeline and has access to ||req||, ||res||, and ||next||.

**Signature:** ||(req, res, next) => {}||

Calling ||next()|| passes control to the next middleware. Not calling it terminates the chain.

**Types I use:**

1. **Global middleware:** Applied to all routes.
[CODEBLOCK]app.use(express.json()); // parse JSON bodies
app.use(cors());         // CORS headers[/CODEBLOCK]

2. **Route-level middleware:**
[CODEBLOCK]app.post('/review', authMiddleware, reviewHandler);[/CODEBLOCK]

3. **Error middleware:** 4-argument signature ||(err, req, res, next)|| \u{2014} Express routes to this when ||next(err)|| is called.

**My own middleware examples from projects:**

- **Auth middleware in CodeSense AI:** Verifies GitHub token from Authorization header, attaches decoded user to ||req.user||.
- **Cache middleware in CodeSense AI:** Computes cache key from request params, checks Redis \u{2014} if HIT returns cached response before the handler runs.
- **Rate limiter:** Using ||express-rate-limit|| to prevent API abuse on public endpoints.

**Order matters:** Middleware executes in the order it's registered. Auth middleware must come before route handlers, logging before everything.`,tags:["express","middleware","node.js","backend"]},{id:"fs-3",category:"fullstack",question:"Explain async/await and how you handle errors with it.",answer:`||async/await|| is syntactic sugar over Promises that makes asynchronous code read like synchronous code.

**How it works:**
- ||async function|| always returns a Promise.
- ||await|| pauses execution inside an async function until the Promise resolves.
- The event loop is NOT blocked \u{2014} other code runs while waiting.

**Error handling patterns I use:**

**Pattern 1: try/catch (most common):**
[CODEBLOCK]async function fetchReview(fileUrl) {
  try {
    const code = await github.fetchFile(fileUrl);
    const review = await claude.review(code);
    return review;
  } catch (err) {
    logger.error('Review failed:', err);
    throw new AppError('Review service unavailable', 503);
  }
}[/CODEBLOCK]

**Pattern 2: Wrapper utility (cleaner for Express routes):**
[CODEBLOCK]const asyncHandler = (fn) => (req, res, next) =>
  Promise.resolve(fn(req, res, next)).catch(next);

app.get('/review', asyncHandler(async (req, res) => {
  // any thrown error goes to error middleware
}));[/CODEBLOCK]

**Common mistake:** Forgetting ||await|| \u{2014} the code continues immediately and you get unhandled Promise rejections. I caught this bug in my early ChromaDB query code where I forgot await on an async collection query.`,tags:["javascript","async","promises","error-handling"]},{id:"fs-4",category:"fullstack",question:"What is the difference between SQL and NoSQL? Which do you prefer and why?",answer:`**SQL (Relational):**
- Tabular structure with schemas and relationships.
- ACID transactions \u{2014} guaranteed consistency.
- Great for: financial data, complex queries with JOINs, normalized relational data.
- Examples: PostgreSQL, MySQL.

**NoSQL:**
- Flexible schemas \u{2014} document, key-value, graph, column-family.
- Scales horizontally more easily.
- Great for: unstructured/semi-structured data, high write throughput, rapidly changing schemas.
- Examples: MongoDB (document), Redis (key-value), ChromaDB (vector).

**What I actually use and why:**

I use **MongoDB** for application data (detections, users, configs) because:
- Schema flexibility suited Print Sentinel \u{2014} the structure of a detection event evolved throughout development.
- Native JSON documents match my API's response format \u{2014} no ORM mapping overhead.
- The aggregation pipeline handles analytics queries I need.

I use **Redis** as a cache and pub/sub \u{2014} it's a key-value store perfectly suited to fast lookups.

I use **ChromaDB** for vector storage \u{2014} purpose-built for embedding-based similarity search.

**When I'd use PostgreSQL:** User financial data, transactional operations (payments, inventory), anything requiring strict referential integrity and complex multi-table queries.

**Honest answer:** For most of my projects, MongoDB has been the right pragmatic choice. I wouldn't default to it for a banking application.`,tags:["database","mongodb","sql","nosql"]},{id:"ai-1",category:"ai_ml",question:"What is YOLOv8 and how does object detection work at a high level?",answer:`YOLO (You Only Look Once) is a real-time object detection architecture. YOLOv8 is the latest from Ultralytics.

**Core idea:** Instead of running a classifier on thousands of proposed regions (like older two-stage detectors), YOLO divides the image into a grid and predicts bounding boxes + class probabilities for all grid cells simultaneously in a single forward pass.

**How it works (simplified):**
1. Image is resized to a fixed input size (e.g., 640\xd7640).
2. Passed through a CNN backbone (feature extraction).
3. The neck (PAN/FPN) combines features at multiple scales \u{2014} helps detect small and large objects.
4. The detection head outputs: bounding box coords (x, y, w, h), objectness score, class probabilities \u{2014} for each anchor at each grid cell.
5. Non-Maximum Suppression (NMS) removes duplicate overlapping boxes.

**Output:** List of detections, each with: [class_label, confidence, x1, y1, x2, y2]

**Why YOLOv8 specifically:**
- Better small-object detection than v5.
- Native Python API: ||results = model(frame)|| \u{2014} extremely clean to integrate.
- Anchor-free design in v8 \u{2014} simpler training and better generalization.

**In my projects:** I used pretrained COCO weights for SafeSight (general object detection) and a fine-tuned model for Print Sentinel (failure-specific classes).`,tags:["yolo","computer-vision","object-detection","ml"]},{id:"ai-2",category:"ai_ml",question:"What are embeddings and why are they fundamental to RAG?",answer:`**Embeddings** are dense vector representations of text (or images, audio) \u{2014} fixed-length arrays of floats where semantically similar content has vectors that are mathematically close to each other.

Example: "spaghetti failure in 3D print" and "filament printing in mid-air" will have embedding vectors close together in vector space, even though they share no words.

**Why embeddings enable RAG:**

RAG needs to find "relevant context" for a query. Traditional keyword search fails when the query uses different words than the document. Embedding-based search (semantic search) finds documents with similar *meaning*, not just matching words.

**My implementation:**
1. At indexing time: each document chunk \u{2192} embedding model \u{2192} store vector in ChromaDB.
2. At query time: query text \u{2192} same embedding model \u{2192} query vector \u{2192} ChromaDB cosine similarity search \u{2192} top-k most similar documents returned.

**Model I used:** ||sentence-transformers/all-MiniLM-L6-v2|| \u{2014} a 384-dimensional model that's fast, runs on CPU, and is accurate enough for domain-specific retrieval.

**Cosine similarity:** Measures the angle between two vectors. Value of 1 = identical direction (most similar), 0 = orthogonal (unrelated), -1 = opposite (rare for text embeddings which are non-negative).

**The key insight:** The embedding model must be the same for both indexing and querying \u{2014} otherwise the vector spaces don't align.`,tags:["embeddings","rag","chromadb","semantic-search","nlp"]},{id:"ai-3",category:"ai_ml",question:"What is the Anthropic tool-use API and how did you use it?",answer:`**Tool-use (function calling)** allows you to give Claude a set of named functions with descriptions and JSON schemas. Claude can then "call" these tools \u{2014} returning structured JSON that your code executes \u{2014} and you return the results to Claude for it to reason over.

**How it works technically:**

1. You define tools in the API request:
[CODEBLOCK]{
  "name": "query_failure_patterns",
  "description": "Search ChromaDB for similar 3D print failure patterns",
  "input_schema": {
    "type": "object",
    "properties": {
      "query": { "type": "string" },
      "k": { "type": "integer", "default": 3 }
    }
  }
}[/CODEBLOCK]

2. Claude responds with a ||tool_use|| content block if it wants to call the tool.
3. Your code executes the actual function (ChromaDB query, in my case).
4. You append a ||tool_result|| message to the conversation with the output.
5. Claude reasons over the result and continues.

**In Print Sentinel:** I exposed 4 tools: ||query_failure_patterns||, ||query_repair_history||, ||check_material_context||, ||calculate_severity_score||. The agentic loop runs up to 8 turns, with Claude calling these tools iteratively until it has enough context to produce a final action recommendation.

**Why tool-use over just injecting context?** Claude decides *what* to look up and *when* \u{2014} it's more adaptive than hardcoding a retrieval pipeline. The agent can choose to skip a tool if it already has sufficient context.`,tags:["anthropic","claude","tool-use","function-calling","agentic"]},{id:"ai-4",category:"ai_ml",question:"What is the difference between fine-tuning and RAG? Which did you use and why?",answer:`**Fine-tuning:** You retrain a model's weights on domain-specific data. The knowledge gets baked into the model's parameters. Expensive, requires curated training data, the model becomes "stale" as your data changes.

**RAG (Retrieval-Augmented Generation):** You keep the base model frozen and inject retrieved context into the prompt at inference time. Knowledge is in your vector database \u{2014} updatable, searchable, without retraining.

**Why I used RAG for Print Sentinel:**
1. **Updatable knowledge base** \u{2014} New failure patterns can be added to ChromaDB without touching the model.
2. **Cost** \u{2014} Fine-tuning Claude would require Anthropic's fine-tuning API access and significant cost. ChromaDB + sentence-transformers is essentially free.
3. **Transparency** \u{2014} RAG lets me see exactly what context the model received. Fine-tuned behavior is harder to audit.
4. **Scale of data** \u{2014} I had ~200 documents of failure patterns and repair history. This is too small for meaningful fine-tuning but ideal for RAG.

**When fine-tuning makes more sense:**
- When you need the model to adopt a very specific style or tone.
- When inference latency from long context injection is a bottleneck.
- When you have large, high-quality labeled datasets (10k+ examples).

**My honest answer:** For a fresher-level project with real constraints, RAG is almost always the right choice. Fine-tuning is a senior/research-team decision.`,tags:["fine-tuning","rag","llm","ml-concepts"]},{id:"sit-1",category:"situational",question:"Tell me about a time you had to learn something quickly under pressure.",answer:`During Print Sentinel's development, I realized mid-sprint that ChromaDB's default ||cosine|| similarity sometimes returned irrelevant results for my failure pattern queries \u{2014} not because of the model, but because I had chunked documents poorly.

I had 2 days before my demo. I'd never worked with embedding chunking strategies before.

**What I did:**
1. Read the ChromaDB and LangChain documentation on document splitting strategies (fixed-size vs. semantic chunking).
2. Ran experiments with different chunk sizes on my failure pattern documents.
3. Discovered that chunking at ~200 tokens with 20-token overlap dramatically improved retrieval relevance.
4. Re-indexed all three collections with the new strategy.

**Result:** Retrieval quality improved significantly \u{2014} the agent started pulling genuinely relevant repair histories instead of tangentially related documents.

**What I learned:** Poor retrieval quality in RAG is almost always a data problem, not a model problem. Garbage in, garbage out applies to vector databases too.`,tags:["learning","STAR","behavioral","rag"]},{id:"sit-2",category:"situational",question:"Describe a situation where you had to explain a technical concept to a non-technical person.",answer:`When presenting Tasuke'26 to my department faculty \u{2014} who are academics, not software engineers \u{2014} I had to explain what a microservices architecture was without using the word "microservices."

**My approach:**
I used a hospital analogy. "Imagine a hospital where the emergency room, pharmacy, and radiology are completely separate departments. They communicate through standardized processes \u{2014} not through one central office that does everything. If the pharmacy is overwhelmed, the emergency room still functions. That's how Tasuke'26 works \u{2014} each module is a separate department that can fail without bringing down the whole system."

**Why it worked:** The faculty could visualize failure isolation, communication overhead, and the trade-off of complexity \u{2014} without needing to understand Docker or REST APIs.

**Follow-up from the faculty:** "So how do the departments talk to each other?" \u{2014} which gave me a natural opening to explain APIs without the word API.

**What I took from it:** The ability to build an analogy on the fly from the listener's frame of reference is a real skill. I now think about the audience's mental model before preparing any explanation.`,tags:["communication","STAR","behavioral","explanation"]},{id:"sit-3",category:"situational",question:"How do you prioritize when you have multiple things to do simultaneously?",answer:`I use a two-axis framework: **urgency \xd7 impact**.

High impact + high urgency \u{2192} do immediately.
High impact + low urgency \u{2192} schedule with a time block.
Low impact + high urgency \u{2192} delegate or timebox to 20 minutes max.
Low impact + low urgency \u{2192} drop or defer indefinitely.

**Practical example:** During Print Sentinel's final sprint, I had three parallel tasks:
1. Fix the Socket.IO CORS issue (high urgency, high impact \u{2014} demo was broken).
2. Polish the frontend UI (medium impact, low urgency \u{2014} demo worked without it).
3. Write the deployment README (low impact, low urgency before demo).

I fixed CORS first, spent 1 hour on UI, and deferred the README to post-demo.

**What I've learned:** The trap is spending time on things that feel urgent but aren't impactful \u{2014} like tweaking color themes when a core feature is broken. Being able to override the "urgency feeling" with a rational impact assessment is a real skill I've actively developed.`,tags:["prioritization","STAR","behavioral","time-management"]},{id:"sit-4",category:"situational",question:"What do you do when you're stuck on a bug for a long time?",answer:`I follow a personal protocol I've refined across multiple projects:

**Step 1 (0\u{2013}30 min): Read the error carefully.** Most bugs are explained by their error message if you read it literally. I was once debugging a "Cannot read property of undefined" for 40 minutes before I actually read the object that was undefined.

**Step 2 (30\u{2013}60 min): Isolate.** Strip the problem down to the minimum reproducible case. Remove everything that's not directly related to the bug. This usually reveals the actual problem.

**Step 3 (60\u{2013}90 min): Rubber duck.** I explain the problem to myself out loud as if teaching it. This surfaces assumptions I've been making incorrectly.

**Step 4 (90 min+): Search with precision.** Not "my Socket.IO doesn't work" \u{2014} but "Socket.IO WebSocket upgrade request blocked Nginx proxy_pass" \u{2014} exact symptoms, not vague descriptions.

**Step 5 (2hr+): Fresh eyes.** Take a 20-minute break. Walk away from the screen. I've solved more bugs in the shower than at my desk.

**Step 6: Ask.** If all else fails \u{2014} ask a colleague, post on Stack Overflow, or ask an AI. But I do the isolation step first so I can ask a precise question, not a "my code is broken help" question.`,tags:["debugging","behavioral","problem-solving"]},{id:"sit-5",category:"situational",question:"How do you stay updated with new technologies in the AI/ML space?",answer:`The AI/ML space moves fast enough that following it passively (Twitter/X, random articles) creates noise without depth. My deliberate system:

**Sources I actually read:**
- **Anthropic's documentation and model cards** \u{2014} directly relevant to my work with the Claude API.
- **Hugging Face papers page** \u{2014} curated ML papers, often with code.
- **Simon Willison's blog** \u{2014} practical AI engineering, not hype.
- **GitHub trending** \u{2014} filtered by Python/JavaScript, weekly.

**Learning by building:** Every concept I want to retain, I implement something with it. I learned RAG by building Print Sentinel's retrieval system \u{2014} not by reading about it.

**Filter for signal:** I ask "is this useful to something I'm building in the next 3 months?" If no, I note it and move on. I don't deep-dive on every new model release.

**Honest admission:** I don't follow everything. I follow deeply what's relevant to the intersection of full-stack engineering and applied AI \u{2014} not pure research papers or model architecture theory (yet).`,tags:["learning","ai","professional-development"]}];function f({activeCategory:e,onSelect:t,mobileOpen:n}){return(0,i.jsxs)("aside",{className:`sidebar ${n?"sidebar--open":""}`,children:[(0,i.jsxs)("div",{className:"sidebar-brand",children:[(0,i.jsx)("div",{className:"brand-dot"}),(0,i.jsxs)("div",{children:[(0,i.jsx)("div",{className:"brand-name",children:"Interview Prep"}),(0,i.jsx)("div",{className:"brand-sub",children:"Bharati Abhay · SDE"})]})]}),(0,i.jsx)("div",{className:"sidebar-section-label",children:"QUESTION BANKS"}),(0,i.jsx)("nav",{className:"sidebar-nav",children:c.map(n=>(0,i.jsxs)("button",{className:`nav-item ${e===n.id?"nav-item--active":""}`,onClick:()=>t(n.id),style:e===n.id?{"--cat-color":n.color}:{},children:[(0,i.jsx)("span",{className:"nav-icon",children:n.icon}),(0,i.jsx)("span",{className:"nav-label",children:n.label}),e===n.id&&(0,i.jsx)("span",{className:"nav-active-bar",style:{background:n.color}})]},n.id))}),(0,i.jsx)("div",{className:"sidebar-footer",children:(0,i.jsxs)("div",{className:"sidebar-footer-text",children:["Press ",(0,i.jsx)("kbd",{children:"E"})," on any answer to edit"]})})]})}var s=o("55zC0");let p="abhay_intro_text",h=`Hi, I'm Bharati Abhay \u{2014} a Full Stack and AI Engineer completing my MCA at Ravenshaw University (CGPA 8.75).
